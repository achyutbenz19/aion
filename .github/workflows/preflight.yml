name: Preflight
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number'
        required: false
      workflow:
        description: 'Workflow id (omit for default)'
        required: false
        default: 'voiceos/onboarding/onboarding-finish'

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/preflight
        with:
          dispatcher_url: 'https://retailers-sleep-diamond-corresponding.trycloudflare.com/dispatch'
          hmac_secret: ${{ secrets.PREFLIGHT_HMAC_SECRET }}
          workflow: ${{ github.event.inputs.workflow || 'voiceos/onboarding/onboarding-finish' }}
          force: 'true'
